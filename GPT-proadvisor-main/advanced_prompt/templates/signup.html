<!DOCTYPE html>
<html>
  {% load static %}

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="shortcut icon"
      type="image/x-icon"
      th:href="@{/resources/images/favicon.png}"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Advanced Prompt</title>

    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="../static/css/header.css" />
    <link rel="stylesheet" href="../static/css/login_design.css" />
    <link rel="stylesheet" href="../static/css/client_tracker.css" />

    <!-- <link th:href="@{/webjars/font-awesome/4.7.0/css/font-awesome.min.css}" rel="stylesheet"> -->
    <!-- <link rel="stylesheet" th:href="@{/resources/css/petclinic.css}" /> -->
    <style>
      @font-face {
        font-family: "Brolink DEMO";
        src: url("{% static "css/BrolinkDEMO.otf" %}") format("opentype");
      }
    </style>
  </head>

  <body class="bg-dark" style="color: #c5c0b7">
    <style>
      .side-menu-links {
        width: 100% !important;
        font-size: small !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
        margin-top: 20% !important;
      }

      .side-menu-links:hover {
        background-color: rgb(74, 74, 74);
      }
    </style>
    <div class="container m-5 text-center">
      {% if error_message %}
      <div class="alert alert-danger" role="alert">{{ error_message }}</div>
      {% endif %} {% if success_message %}
      <div class="alert alert-success" role="alert">{{ success_message }}</div>
      {% endif %}
    </div>

    <div
      class="container mx-auto shadow-lg p-5 text-center"
      style="
        height: 60vh !important;
        width: 30%;
        margin-top: 10%;
        background-color: #393838;
      "
    >
      <div class="d-flex align-items-center pb-2">
        <div class="row m-auto">
          <div class="col-2">
            <img
              src="./media/media/logo/logo.png"
              class=""
              alt="ProAdvisor.AI"
              style="height: 60px; width: 60px"
            />
          </div>
          <div class="col-3 d-flex align-items-center">
            <h3
              class="m-auto pt-2"
              style="font-family: 'Brolink DEMO', sans-serif"
            >
              ProAdvisor.AI
            </h3>
          </div>
        </div>
      </div>

      <h4>Sign Up</h4>
      <form class="mt-3" action="/signup" method="post">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-6">
            <input
              class="form-control form-input-control"
              type="text"
              id="firstname"
              name="firstname"
              placeholder="First Name"
              aria-label="First Name"
              value="{{values.firstname}}"
              required
            />
          </div>
          <div class="col-md-6">
            <input
              class="form-control form-input-control"
              type="text"
              id="lastname"
              name="lastname"
              placeholder="Last Name"
              aria-label="Last Name"
              value="{{values.lastname}}"
              required
            />
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-md-6">
            <input
              class="form-control form-input-control"
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              aria-label="Password"
              required
            />
          </div>
          <div class="col-md-6">
            <input
              class="form-control form-input-control"
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Confirm Password"
              aria-label="Confirm Password"
              required
            />
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-md-12">
            <input
              class="form-control form-input-control"
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              aria-label="Email"
              value="{{values.email}}"
              required
            />
          </div>
        </div>
        <div class="text-center">
          <input
            id="signin_submit"
            name="signup_submit"
            class="btn btn-primary mt-4"
            style="background-color: rgb(36, 115, 174) !important"
            type="submit"
            value="Sign up"
          />
        </div>
      </form>

      <br/>
<br/>
<br/>
<hr/>

    <div  class="text-center">
      <p>Already have account! then <a href="{% url 'signin' %}" style="color: #c5c0b7;font-weight: bolder;">Go to Signin</a></p>
    </div>

  </body>
</html>
