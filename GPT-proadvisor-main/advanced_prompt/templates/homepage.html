{% extends 'base.html' %}

{% block content %}
  

<div class="container-fluid mt-3">
  {% for i in categories %}
  <button class="btn btn-outline-dark text-white me-2 get-category" style="background-color: #333;border-radius: 10px; padding:0.9%; font-size:14px;" data-id="{{i.id}}">{{i.category}}</button>
  {% endfor %}
</div>


<!-- Swiper -->
<div #swiperRef="" class="swiper mySwiper ms-3 mt-5">
  <div class="swiper-wrapper">
    {% for i in data %}        
    <div class="swiper-slide shadow me-sm-1 filter-card" data-header="{{ i.header_text }}" style="border-radius: 10px; width: 211px !important; height: 262px;">
      <a href="/chat/{{i.id}}" class="h-100 border-0 text-decoration-none" data-id="{{ i.id }}" class="btn text-white"  style="background-color: #2e2e2e;border-radius: 10px; width: 100%; height: 100%;">
        <div class="card h-100 text-white pt-3 border-0 card-color" style="background-color: #2e2e2e;">
          <div class="ratio ratio-1x1 w-50 mx-auto rounded" style="width: 90px !important; height: 90px !important;">
              <img src="./media/{{i.accountant_image}}" class="card-img-top rounded" alt="">
          </div>
          <div class="card-body">
              <h6 class="card-title header_text" id="header_text" data-id="{{ i.id }}"><strong>{{i.header_text}}</strong></h6>
              <p class="card-text lead mt-1 tagline_text">{{i.tagline_text}}</p>
              <span class="category-title float-end shadow-lg" data-color="{{ i.category_id.color }}" style="border-radius: 50%; width: 8px; height: 8px; position: absolute; bottom: 10px; right: 10px; background-color: {{i.category_id.color}};"></span>
          </div>
      </div>
      
      </a>
    </div>
    {% endfor %}
  
  </div>
  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
</div>
<!-- swiper end here -->




<div #swiperRef="" class="swiper mySwiper mt-4 ms-3">
  <div class="swiper-wrapper">
    {% for i in data %}        
    <div id="swiper-slide-test" class="swiper-slide me-1" style="border-radius: 10px; height:140px;">
      <button id="card_link" class="test-card-link h-25 get-data border-0" data-id="{{ i.id }}" class="btn text-white" onclick="testdataid(this)" style="width: 24rem;background-color:#212529;border-radius: 10px;">
        <div class="container row">
          <div class="col-md-3">
            <img class="rounded" style="width: 55px; height:55px;" src="./media/{{i.accountant_image}}" alt="">
          </div>
          <div class="col-md-9 text-start ps-3">
            <h6 class="card-title text-light" id="header_text" data-id="{{ i.id }}" >{{i.header_text}}</h6>
            <h6 class="card-title text-light mt-2" style="font-size: 0.8rem; font-style:italic;">Try Saying</h6>
          </div>
        </div>
        <div class="container mt-3 text-start p-3 rounded" style="background-color: #333;">
          <h6 class="card-title text-light border-rounded rounded" style="font-size: 0.8rem; font-style:italic;">"{{i.tag_line}}"</h6>
        </div>
      </button>
    </div>
    {% endfor %}
  </div>
  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
</div>
<!-- swiper end here -->

{% endfor %}



{% endblock %}
