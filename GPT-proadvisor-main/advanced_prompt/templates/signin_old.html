<!doctype html>
<html>
{% load static %}

<head>
  <title>ProAdvisor</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/resources/images/favicon.png}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="../static/css/header.css">
  <link rel="stylesheet" href="../static/css/login_design.css">
  <link rel="stylesheet" href="../static/css/client_tracker.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.20/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.0.20/dist/sweetalert2.min.js"></script>

  <style>
    .side-menu-links{
    width:100% !important;
    font-size: small !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
    margin-top: 20% !important;
    }
    .side-menu-links:hover{
      background-color: rgb(74, 74, 74);
    }

  </style>
</head>

<body class="bg-dark" style="color: #c5c0b7;">

  <div class="container mx-auto shadow-lg p-5 text-center" style="height:320px !important;width:30%; margin-top: 10%;background-color: #393838;">
    <div>
      
        <div class="d-flex align-items-center">
          <div class="row m-auto">
          <div class="col-2">
            <img src="./media/media/logo/logo.png" class="" alt="ProAdvisor.AI" style="height: 60px; width: 60px;">
          </div>
          <div class="col-3 d-flex align-items-center">
            <h3 class="m-auto pt-2" style="font-family: 'Brolink DEMO', sans-serif;">ProAdvisor.AI</h3>
          </div>
        </div>
        </div>

<h4 class="p-2">Sign In</h4>
<form class="mt-3" method="post" action="signin">
  {% csrf_token %}
  <input class="form-control form-input-control" type="email" id="email" name="email" placeholder="Email" aria-label="Email" required>
  <input class="form-control mt-3 form-input-control" type="password" id="password" name="password" placeholder="Password" aria-label="Password" required>
  <input id="signin_submit" name="signin_submit" class="btn btn-primary mt-3 float-end" style="background-color: rgb(36, 115, 174) !important;" type="submit" value="Sign in">
</form>
<br/>
<br/>
<br/>
<hr/>
  </div>
  <p>Don't have account yet? <a href="{% url 'signup' %}" style="color: #c5c0b7;font-weight: bolder;">Create new account</a></p>
  </div>


  <div class="container m-5 text-center">
    {% if error_message %}
    <script>
        Swal.fire({
            position: 'top-end',
            width: '300px', 
            background: '#f8d7da',
            icon: 'error',
            title: 'Oops...',
            text: '{{ error_message }}',
            customClass: {
                container: 'custom-swal-container', 
                title: 'custom-swal-title', 
                content: 'custom-swal-content' 
            },
            showConfirmButton: false, 
            timer: 3000 
        });
    </script>
    {% endif %}
  </div>

</body>
</html>
